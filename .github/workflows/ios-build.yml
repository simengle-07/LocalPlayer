name: Build iOS App

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Generate and build
    runs-on: macos-latest

    steps:
      - name: Download source code
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build and test for iOS Simulator
        shell: bash
        run: |
          simulator_id="$(
            xcrun simctl list devices available -j |
              jq -r '
                .devices
                | to_entries[]
                | select(.key | startswith("com.apple.CoreSimulator.SimRuntime.iOS-"))
                | .value[]
                | select(.isAvailable == true)
                | .udid
              ' |
              head -n 1
          )"

          if [ -z "$simulator_id" ]; then
            echo "No available iOS simulator found."
            exit 1
          fi

          xcodebuild \
            -project LocalPlayer.xcodeproj \
            -scheme LocalPlayer \
            -destination "platform=iOS Simulator,id=$simulator_id" \
            CODE_SIGNING_ALLOWED=NO \
            test

      - name: Archive unsigned iOS app
        shell: bash
        run: |
          xcodebuild \
            -project LocalPlayer.xcodeproj \
            -scheme LocalPlayer \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/LocalPlayer.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            archive

      - name: Verify archived app configuration
        shell: bash
        run: |
          app_info_plist="$RUNNER_TEMP/LocalPlayer.xcarchive/Products/Applications/LocalPlayer.app/Info.plist"

          plutil -extract UIBackgroundModes xml1 -o - "$app_info_plist" | grep -q '<string>audio</string>'
          plutil -extract UILaunchScreen xml1 -o - "$app_info_plist" | grep -q '<dict'
          plutil -extract UIDeviceFamily xml1 -o - "$app_info_plist" | grep -q '<integer>1</integer>'

          if plutil -extract UIDeviceFamily xml1 -o - "$app_info_plist" | grep -q '<integer>2</integer>'; then
            echo "The archived app must target iPhone only."
            exit 1
          fi

      - name: Package unsigned IPA
        shell: bash
        run: |
          ipa_directory="$(mktemp -d "$RUNNER_TEMP/localplayer-ipa.XXXXXX")"
          ipa_path="$GITHUB_WORKSPACE/LocalPlayer-unsigned.ipa"

          mkdir -p "$ipa_directory/Payload"
          cp -R "$RUNNER_TEMP/LocalPlayer.xcarchive/Products/Applications/LocalPlayer.app" \
            "$ipa_directory/Payload/"

          (
            cd "$ipa_directory"
            /usr/bin/zip -r "$ipa_path" Payload
          )

          unzip -l "$ipa_path" | grep -q "Payload/LocalPlayer.app/Info.plist"

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: LocalPlayer-unsigned-ipa
          path: LocalPlayer-unsigned.ipa
          if-no-files-found: error
