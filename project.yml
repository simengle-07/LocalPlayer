name: LocalPlayer

options:
  deploymentTarget:
    iOS: "17.0"

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  LocalPlayer:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: Models
      - path: Services
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mika.localplayer
        GENERATE_INFOPLIST_FILE: YES

  LocalPlayerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: LocalPlayerTests
    dependencies:
      - target: LocalPlayer

schemes:
  LocalPlayer:
    build:
      targets:
        LocalPlayer: all
        LocalPlayerTests: [test]
    test:
      gatherCoverageData: true
      targets:
        - LocalPlayerTests
